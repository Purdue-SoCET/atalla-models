# Tiled GEMM correctness lock (4×4×16): trace compare + matched suite.
# Layout: repo root = atalla-models/ with functional_sim/ and aihw-ppci-compiler/ siblings.

name: functional_sim GEMM tiled regressions

on:
  push:
    paths:
      - "functional_sim/gemm_tiled_gemm_trace_c_vs_gen.py"
      - "functional_sim/matched_kernel_suite.py"
      - "functional_sim/build_gemm_tiled.py"
      - "functional_sim/src/**"
      - "aihw-ppci-compiler/atalla_tests/kernels/gemm_tiled*.c"
  pull_request:
    paths:
      - "functional_sim/gemm_tiled_gemm_trace_c_vs_gen.py"
      - "functional_sim/matched_kernel_suite.py"
      - "functional_sim/build_gemm_tiled.py"
      - "functional_sim/src/**"
      - "aihw-ppci-compiler/atalla_tests/kernels/gemm_tiled*.c"

jobs:
  gemm-tiled-regressions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PPCI and numpy
        run: |
          pip install numpy
          pip install -e ./aihw-ppci-compiler

      - name: GEMM trace (C vs generator)
        working-directory: functional_sim
        run: python gemm_tiled_gemm_trace_c_vs_gen.py

      - name: Matched suite (baseline + pipelined 4×4×16)
        working-directory: functional_sim
        run: python matched_kernel_suite.py --spec gemm_tiled_4x4x16,gemm_tiled_pipelined_4x4x16
